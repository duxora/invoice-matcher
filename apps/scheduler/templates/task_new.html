{% extends "base.html" %}
{% block title %}Create New Task - Scheduler{% endblock %}

{% block content %}
<div class="mb-2">
  <a href="/scheduler/" class="text-hub-accent text-sm hover:underline">&larr; Back to Dashboard</a>
</div>

<div class="mb-6">
  <h1 class="text-2xl font-bold">Create New Task</h1>
</div>

<div class="bg-hub-card border border-hub-border rounded-lg p-6 max-w-2xl">
  <form method="post" action="/scheduler/tasks-new" class="space-y-4">
    <!-- Name -->
    <div>
      <label for="name" class="block text-sm font-medium mb-1">Name</label>
      <input type="text" id="name" name="name" required
             class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
    </div>

    <!-- Schedule -->
    <div>
      <label for="schedule" class="block text-sm font-medium mb-1">Schedule (cron expression)</label>
      <input type="text" id="schedule" name="schedule" required placeholder="*/30 * * * *"
             class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
    </div>

    <!-- Workdir -->
    <div>
      <label for="workdir" class="block text-sm font-medium mb-1">Working Directory</label>
      <input type="text" id="workdir" name="workdir" placeholder="/path/to/project"
             class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- Model -->
      <div>
        <label for="model" class="block text-sm font-medium mb-1">Model</label>
        <select id="model" name="model"
                class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
          <option value="claude-sonnet-4-6" selected>claude-sonnet-4-6</option>
          <option value="claude-opus-4-6">claude-opus-4-6</option>
          <option value="claude-haiku-4-5">claude-haiku-4-5</option>
        </select>
      </div>

      <!-- On Failure -->
      <div>
        <label for="on_failure" class="block text-sm font-medium mb-1">On Failure</label>
        <select id="on_failure" name="on_failure"
                class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
          <option value="retry" selected>retry</option>
          <option value="skip">skip</option>
          <option value="ticket">ticket</option>
          <option value="notify">notify</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <!-- Tools -->
      <div>
        <label for="tools" class="block text-sm font-medium mb-1">Tools</label>
        <input type="text" id="tools" name="tools" value="Read,Grep,Glob"
               class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
      </div>

      <!-- Max Turns -->
      <div>
        <label for="max_turns" class="block text-sm font-medium mb-1">Max Turns</label>
        <input type="number" id="max_turns" name="max_turns" value="10" min="1"
               class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
      </div>

      <!-- Timeout -->
      <div>
        <label for="timeout" class="block text-sm font-medium mb-1">Timeout (s)</label>
        <input type="number" id="timeout" name="timeout" value="300" min="10"
               class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
      </div>
    </div>

    <!-- Retry -->
    <div>
      <label for="retry" class="block text-sm font-medium mb-1">Retry Count</label>
      <input type="number" id="retry" name="retry" value="0" min="0"
             class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent">
    </div>

    <!-- Prompt -->
    <div>
      <label for="prompt" class="block text-sm font-medium mb-1">Prompt</label>
      <textarea id="prompt" name="prompt" rows="8" required
                class="w-full px-3 py-2 text-sm bg-hub-bg border border-hub-border rounded focus:outline-none focus:border-hub-accent font-mono"
                placeholder="Describe what this task should do..."></textarea>
    </div>

    <!-- Buttons -->
    <div class="flex items-center gap-3 pt-2">
      <button type="submit"
              class="px-5 py-2 text-sm rounded bg-hub-accent text-hub-bg font-medium hover:bg-hub-accent/80 transition-colors">
        Create Task
      </button>
      <a href="/scheduler/"
         class="px-5 py-2 text-sm rounded border border-hub-border text-hub-muted hover:text-hub-text transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
