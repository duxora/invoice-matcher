app = "family-timetable"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.timetable"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/api/config"
    interval = "30s"
    timeout = "5s"
